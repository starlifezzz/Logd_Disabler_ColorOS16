<body>
    <div id="app"></div>
    
    <script>
        // 兼容 apatch
        if (window.apatch !== undefined && window.apatch.ksu === undefined) {
            window.ksu = window.apatch;
        }
    </script>
    
    <script>
        let callbackId = 0;
        function generateCallbackName(prefix) {
            return `${prefix}_callback_${Date.now()}_${callbackId++}`;
        }
        
        function execCommand(command, options = {}) {
            return new Promise((resolve, reject) => {
                const callbackName = generateCallbackName("exec");
                window[callbackName] = (errno, stdout, stderr) => {
                    resolve({ errno, stdout, stderr });
                    delete window[callbackName];
                };
                
                try {
                    ksu.exec(command, JSON.stringify(options), callbackName);
                } catch (error) {
                    reject(error);
                    delete window[callbackName];
                }
            });
        }
        
        // 设置环境变量 PATH
        const PATH_ENV = ["/system/bin", "/data/adb/ksu/bin", "/data/adb/modules/zygisksu/bin"].join(":");
        const defaultOptions = { env: { PATH: PATH_ENV } };
        
        // 执行 shell 命令的封装
        async function executeShell(command) {
            try {
                const result = await execCommand(`sh -c '${command}'`, defaultOptions);
                return result;
            } catch (error) {
                return { errno: -1, stdout: "", stderr: error.toString() };
            }
        }
        
        // 获取系统属性
        async function getSystemProperty(key, defaultValue = "false") {
            try {
                const result = await executeShell(`getprop ${key}`);
                if (result.errno === 0) {
                    return result.stdout.trim() || defaultValue;
                }
                return defaultValue;
            } catch (error) {
                console.error("Failed to get property:", key, error);
                return defaultValue;
            }
        }
        
        // 设置系统属性
        async function setSystemProperty(key, value) {
            try {
                const result = await executeShell(`setprop ${key} ${value}`);
                return result.errno === 0;
            } catch (error) {
                console.error("Failed to set property:", key, value, error);
                return false;
            }
        }
        
        // 检查进程是否运行 - 简化为直接使用ps方法，匹配手动测试
        async function checkProcess(processName) {
            try {
                // 直接使用 ps 方法，与手动测试 'ps -A | grep -v grep | grep logd' 保持一致
                const result = await executeShell(`ps -A | grep -v grep | grep "${processName}"`);
                return result.stdout.trim() !== "";
            } catch (error) {
                console.error("Process check failed:", processName, error);
                return false;
            }
        }
        
        // 检查包是否被禁用
        async function checkPackageDisabled(packageName) {
            try {
                // 首先检查包是否存在
                const listResult = await executeShell(`pm list packages --user 0 | grep "${packageName}"`);
                if (listResult.stdout.trim() === "") {
                    return "not_exists"; // 包不存在
                }
                
                // 检查是否被禁用
                const disabledResult = await executeShell(`pm list packages -d --user 0 | grep "${packageName}"`);
                return disabledResult.stdout.trim() !== "";
            } catch (error) {
                return "error";
            }
        }
        
        // 检查内核参数
        async function checkKernelParam(paramPath, expectedValue) {
            try {
                const result = await executeShell(`[ -f "${paramPath}" ] && cat "${paramPath}"`);
                if (result.stdout.trim() === expectedValue) {
                    return true;
                }
                return false;
            } catch (error) {
                return false;
            }
        }
        
        // 检查文件状态
        async function checkFileStatus(filePath) {
            try {
                const existsResult = await executeShell(`[ -f "${filePath}" ] && echo "exists"`);
                if (existsResult.stdout.trim() !== "exists") {
                    return "not_exists";
                }
                
                const executableResult = await executeShell(`[ -x "${filePath}" ] && echo "executable"`);
                if (executableResult.stdout.trim() === "executable") {
                    return "executable";
                }
                
                return "exists_not_executable";
            } catch (error) {
                return "error";
            }
        }
        
        // 检查 SELinux 状态
        async function checkSELinuxStatus() {
            try {
                const result = await executeShell("getenforce");
                return result.stdout.trim();
            } catch (error) {
                return "unknown";
            }
        }
        
        // 检查 ZRAM 状态
        async function checkZRAMStatus() {
            try {
                const disksizeResult = await executeShell('[ -f "/sys/block/zram0/disksize" ] && cat "/sys/block/zram0/disksize"');
                const size = disksizeResult.stdout.trim();
                if (size && /^\d+$/.test(size) && parseInt(size) > 0) {
                    return Math.floor(parseInt(size) / 1024 / 1024) + " MB";
                }
                return "disabled";
            } catch (error) {
                return "error";
            }
        }
        
        // 检查 KernelSU 环境
        async function checkRootEnvironment() {
            try {
                const ksuResult = await executeShell('[ -d "/data/adb/ksu" ] && echo "ksu"');
                if (ksuResult.stdout.trim() === "ksu") {
                    return "KernelSU";
                }
                
                const magiskResult = await executeShell('[ -d "/data/adb/magisk" ] && echo "magisk"');
                if (magiskResult.stdout.trim() === "magisk") {
                    return "Magisk";
                }
                
                return "unknown";
            } catch (error) {
                return "error";
            }
        }
        
        // 检查 KernelSU API 是否可用
        function isKsuAvailable() {
            return typeof ksu !== 'undefined' && typeof ksu.exec === 'function';
        }
        
        // 定义所有可配置的优化选项
        const OPTIMIZATION_OPTIONS = [
            {
                key: 'disable_logd',
                name: '禁用logd日志系统',
                description: '彻底禁用logd，永久封死复活',
                defaultValue: true,
                category: 'enabled'
            },
            {
                key: 'block_ota',
                name: '阻断OTA自动更新',
                description: '彻底阻断OTA自动更新',
                defaultValue: true,
                category: 'enabled'
            },
            {
                key: 'lock_developer_options',
                name: '锁定开发者选项',
                description: '锁定开发者选项不被系统重置',
                defaultValue: true,
                category: 'enabled'
            },
            {
                key: 'block_ads_and_tracking',
                name: '屏蔽广告与数据收集',
                description: '屏蔽冗余耗电服务、广告、数据收集',
                defaultValue: true,
                category: 'enabled'
            },
            {
                key: 'memory_io_optimization',
                name: '内存/IO轻量优化',
                description: '内存/IO轻量优化（无副作用）',
                defaultValue: true,
                category: 'enabled'
            },
            {
                key: 'extra_kernel_optimization',
                name: '额外内核优化',
                description: '额外内核优化参数',
                defaultValue: true,
                category: 'enabled'
            },
            {
                key: 'kill_redundant_processes',
                name: '进程查杀优化',
                description: '核心冗余进程查杀',
                defaultValue: true,
                category: 'enabled'
            },
            {
                key: 'system_prop_toggles',
                name: '系统属性开关',
                description: '冗余服务开关锁定',
                defaultValue: true,
                category: 'enabled'
            },
            {
                key: 'disable_health_services',
                name: '禁用健康服务',
                description: '禁用健康与运动服务（非必要后台服务）',
                defaultValue: false,
                category: 'disabled'
            },
            {
                key: 'disable_network_monitoring',
                name: '禁用流量监控',
                description: '禁用流量监控与网络服务（减少后台网络活动）',
                defaultValue: false,
                category: 'disabled'
            },
            {
                key: 'disable_lockscreen_magazine',
                name: '禁用锁屏杂志',
                description: '禁用锁屏杂志与壁纸服务（节省存储和网络）',
                defaultValue: false,
                category: 'disabled'
            },
            {
                key: 'disable_gamespace',
                name: '禁用游戏空间',
                description: '禁用游戏空间与性能监控（减少系统负载）',
                defaultValue: false,
                category: 'disabled'
            },
            {
                key: 'disable_wallet_services',
                name: '禁用钱包服务',
                description: '禁用钱包与支付相关服务（如不需要NFC支付）',
                defaultValue: false,
                category: 'disabled'
            },
            {
                key: 'disable_backup_services',
                name: '禁用备份服务',
                description: '禁用备份与云服务（如不需要自动备份）',
                defaultValue: false,
                category: 'disabled'
            }
        ];
        
        // 验证功能状态
        async function verifyFunctionality() {
            const results = {};
            
            // 1. 日志系统优化
            results.disable_logd = {
                title: "日志系统优化",
                status: "checking",
                details: []
            };
            
            // 检查 logd 进程
            const logdRunning = await checkProcess("logd");
            if (!logdRunning) {
                results.disable_logd.details.push({ name: "logd 进程", status: "success", message: "已停止" });
            } else {
                results.disable_logd.details.push({ name: "logd 进程", status: "error", message: "仍在运行" });
            }
            
            // 检查 logd 文件
            const logdFileStatus = await checkFileStatus("/system/bin/logd");
            if (logdFileStatus === "exists_not_executable") {
                results.disable_logd.details.push({ name: "logd 文件", status: "success", message: "已被挂载覆盖或禁用" });
            } else if (logdFileStatus === "not_exists") {
                // results.disable_logd.details.push({ name: "logd 文件", status: "warning", message: "文件不存在" });
                results.disable_logd.details.push({ name: "logd 文件", status: "success", message: "文件不存在" });
            } else {
                results.disable_logd.details.push({ name: "logd 文件", status: "error", message: "仍可执行" });
            }
            
            // 2. OTA更新阻断
            results.block_ota = {
                title: "OTA更新阻断",
                status: "checking",
                details: []
            };
            
            const updateEngineRunning = await checkProcess("update_engine");
            if (!updateEngineRunning) {
                results.block_ota.details.push({ name: "update_engine 进程", status: "success", message: "已停止" });
            } else {
                results.block_ota.details.push({ name: "update_engine 进程", status: "error", message: "仍在运行" });
            }
            
            // 检查 OTA 相关包
            const otaPackages = ["com.oplus.ota", "com.oplus.sau"];
            for (const pkg of otaPackages) {
                const pkgStatus = await checkPackageDisabled(pkg);
                if (pkgStatus === true) {
                    results.block_ota.details.push({ name: pkg, status: "success", message: "已禁用" });
                } else if (pkgStatus === "not_exists") {
                    results.block_ota.details.push({ name: pkg, status: "warning", message: "包不存在" });
                } else {
                    results.block_ota.details.push({ name: pkg, status: "error", message: "未禁用" });
                }
            }
            
            // 检查系统属性
            const otaProps = [
                { prop: "persist.ota.auto_download", expected: "0" },
                { prop: "persist.sys.recovery_update", expected: "0" }
            ];
            for (const propInfo of otaProps) {
                const actual = await getSystemProperty(propInfo.prop, "");
                if (actual === propInfo.expected) {
                    results.block_ota.details.push({ name: propInfo.prop, status: "success", message: `正确 (${actual})` });
                } else {
                    results.block_ota.details.push({ name: propInfo.prop, status: "error", message: `错误 (期望: ${propInfo.expected}, 实际: ${actual})` });
                }
            }
            
            // 3. 开发者选项锁定
            results.lock_developer_options = {
                title: "开发者选项锁定",
                status: "checking",
                details: []
            };
            
            const devLockProp = await getSystemProperty("persist.dev.option.lock", "");
            if (devLockProp === "1") {
                results.lock_developer_options.details.push({ name: "persist.dev.option.lock", status: "success", message: "正确 (1)" });
            } else {
                results.lock_developer_options.details.push({ name: "persist.dev.option.lock", status: "error", message: `错误 (期望: 1, 实际: ${devLockProp})` });
            }
            
            // 4. 广告与数据收集屏蔽
            results.block_ads_and_tracking = {
                title: "广告与数据收集屏蔽",
                status: "checking",
                details: []
            };
            
            const adPackages = ["com.oplus.statistics.rom", "com.coloros.assistant", "com.coloros.assistantscreen"];
            for (const pkg of adPackages) {
                const pkgStatus = await checkPackageDisabled(pkg);
                if (pkgStatus === true) {
                    results.block_ads_and_tracking.details.push({ name: pkg, status: "success", message: "已禁用" });
                } else if (pkgStatus === "not_exists") {
                    results.block_ads_and_tracking.details.push({ name: pkg, status: "warning", message: "包不存在" });
                } else {
                    results.block_ads_and_tracking.details.push({ name: pkg, status: "error", message: "未禁用" });
                }
            }
            
            const adProps = [
                { prop: "persist.sys.oplus.ad_enable", expected: "0" },
                { prop: "persist.sys.oplus.personalized_ad", expected: "0" },
                { prop: "persist.ad.track", expected: "0" },
                { prop: "persist.sys.usage_stat_enable", expected: "0" },
                { prop: "persist.oppo.collect", expected: "0" }
            ];
            for (const propInfo of adProps) {
                const actual = await getSystemProperty(propInfo.prop, "");
                if (actual === propInfo.expected) {
                    results.block_ads_and_tracking.details.push({ name: propInfo.prop, status: "success", message: `正确 (${actual})` });
                } else {
                    results.block_ads_and_tracking.details.push({ name: propInfo.prop, status: "error", message: `错误 (期望: ${propInfo.expected}, 实际: ${actual})` });
                }
            }
            
            // 5. 内存/IO优化
            results.memory_io_optimization = {
                title: "内存/IO优化",
                status: "checking",
                details: []
            };
            
            const kernelParams = [
                { path: "/proc/sys/kernel/sched_schedstats", expected: "0" },
                { path: "/sys/module/binder/parameters/debug_mask", expected: "0" },
                { path: "/proc/sys/vm/compact_unevictable_allowed", expected: "0" }
            ];
            for (const param of kernelParams) {
                const isCorrect = await checkKernelParam(param.path, param.expected);
                if (isCorrect) {
                    results.memory_io_optimization.details.push({ name: param.path, status: "success", message: `正确 (${param.expected})` });
                } else {
                    results.memory_io_optimization.details.push({ name: param.path, status: "error", message: `错误 (期望: ${param.expected})` });
                }
            }
            
            // 6. 冗余进程状态
            results.kill_redundant_processes = {
                title: "冗余进程状态",
                status: "checking",
                details: []
            };
            
            const redundantProcesses = ["smartscene", "preload", "sysmonitor", "hotstart"];
            for (const proc of redundantProcesses) {
                const isRunning = await checkProcess(proc);
                if (!isRunning) {
                    results.kill_redundant_processes.details.push({ name: proc, status: "success", message: "已停止" });
                } else {
                    results.kill_redundant_processes.details.push({ name: proc, status: "error", message: "仍在运行" });
                }
            }
            
            // 7. 健康服务状态
            results.disable_health_services = {
                title: "健康服务状态",
                status: "checking",
                details: []
            };
            
            const healthPackages = ["com.oplus.healthservice", "com.oplus.sports"];
            for (const pkg of healthPackages) {
                const pkgStatus = await checkPackageDisabled(pkg);
                if (pkgStatus === true) {
                    results.disable_health_services.details.push({ name: pkg, status: "success", message: "已禁用" });
                } else if (pkgStatus === "not_exists") {
                    results.disable_health_services.details.push({ name: pkg, status: "warning", message: "包不存在" });
                } else {
                    results.disable_health_services.details.push({ name: pkg, status: "error", message: "未禁用" });
                }
            }
            
            // 8. SELinux 状态
            results.selinux_status = {
                title: "SELinux 状态",
                status: "checking",
                details: []
            };
            
            const selinuxStatus = await checkSELinuxStatus();
            if (selinuxStatus === "Permissive") {
                results.selinux_status.details.push({ name: "SELinux", status: "success", message: "宽容模式" });
            } else if (selinuxStatus === "Enforcing") {
                results.selinux_status.details.push({ name: "SELinux", status: "warning", message: "强制模式 - 可能影响优化生效" });
            } else {
                results.selinux_status.details.push({ name: "SELinux", status: "error", message: `未知状态: ${selinuxStatus}` });
            }
            
            // 9. ZRAM 状态
            results.zram_status = {
                title: "ZRAM/Swap 状态",
                status: "checking",
                details: []
            };
            
            const zramStatus = await checkZRAMStatus();
            if (zramStatus !== "disabled" && zramStatus !== "error") {
                results.zram_status.details.push({ name: "ZRAM", status: "success", message: `已启用 (${zramStatus})` });
            } else if (zramStatus === "disabled") {
                results.zram_status.details.push({ name: "ZRAM", status: "warning", message: "未启用" });
            } else {
                results.zram_status.details.push({ name: "ZRAM", status: "error", message: "检测失败" });
            }
            
            // 10. Root 环境
            results.root_environment = {
                title: "Root 环境",
                status: "checking",
                details: []
            };
            
            const rootEnv = await checkRootEnvironment();
            if (rootEnv === "KernelSU") {
                results.root_environment.details.push({ name: "Root 管理器", status: "success", message: "KernelSU" });
            } else if (rootEnv === "Magisk") {
                results.root_environment.details.push({ name: "Root 管理器", status: "success", message: "Magisk" });
            } else {
                results.root_environment.details.push({ name: "Root 管理器", status: "error", message: "未检测到" });
            }
            
            // 计算整体状态
            for (const key in results) {
                let hasError = false;
                let hasWarning = false;
                let allSuccess = true;
                
                for (const detail of results[key].details) {
                    if (detail.status === "error") {
                        hasError = true;
                        allSuccess = false;
                    } else if (detail.status === "warning") {
                        hasWarning = true;
                        allSuccess = false;
                    }
                }
                
                if (hasError) {
                    results[key].status = "error";
                } else if (hasWarning) {
                    results[key].status = "warning";
                } else if (allSuccess) {
                    results[key].status = "success";
                } else {
                    results[key].status = "unknown";
                }
            }
            
            return results;
        }
        
        // 初始化应用
        async function initializeApp() {
            const appContainer = document.getElementById('app');
            
            if (!isKsuAvailable()) {
                appContainer.innerHTML = `
                    <div style="padding: 20px; text-align: center;">
                        <h2>❌ KernelSU API 不可用</h2>
                        <p>请确保您已正确安装 KernelSU 并授予此模块权限。</p>
                        <p>如果问题持续存在，请检查您的 KernelSU 版本。</p>
                    </div>
                `;
                return;
            }
            
            // 创建 Vue 应用
            const { createApp, ref, onMounted, computed } = Vue;
            
            const app = createApp({
                setup() {
                    const settings = ref({});
                    const loading = ref(true);
                    const saving = ref(false);
                    const errorMessage = ref('');
                    const currentPage = ref('config'); // 'config' or 'verify'
                    const verificationResults = ref({});
                    const verifying = ref(false);
                    
                    // 计算属性：分离启用和禁用的选项
                    const enabledOptions = computed(() => 
                        OPTIMIZATION_OPTIONS.filter(option => option.category === 'enabled')
                    );
                    
                    const disabledOptions = computed(() => 
                        OPTIMIZATION_OPTIONS.filter(option => option.category === 'disabled')
                    );
                    
                    // 加载当前设置
                    const loadSettings = async () => {
                        try {
                            const newSettings = {};
                            for (const option of OPTIMIZATION_OPTIONS) {
                                const propKey = `persist.sys.coloros16_optimize_gui.${option.key}`;
                                const value = await getSystemProperty(propKey, option.defaultValue ? 'true' : 'false');
                                newSettings[option.key] = value === 'true';
                            }
                            settings.value = newSettings;
                        } catch (error) {
                            errorMessage.value = '加载设置失败: ' + error.message;
                        } finally {
                            loading.value = false;
                        }
                    };
                    
                    // 保存设置
                    const saveSettings = async () => {
                        if (saving.value) return;
                        
                        saving.value = true;
                        errorMessage.value = '';
                        
                        try {
                            let allSuccess = true;
                            for (const option of OPTIMIZATION_OPTIONS) {
                                const propKey = `persist.sys.coloros16_optimize_gui.${option.key}`;
                                const value = settings.value[option.key] ? 'true' : 'false';
                                const success = await setSystemProperty(propKey, value);
                                if (!success) {
                                    allSuccess = false;
                                }
                            }
                            
                            if (allSuccess) {
                                alert('✅ 设置已保存成功！\n\n设备将在几秒后自动重启以应用更改。\n\n如果未自动重启，请手动重启设备。');
                                // 触发重启
                                await executeShell('reboot');
                            } else {
                                errorMessage.value = '❌ 保存设置失败，请重试。';
                            }
                        } catch (error) {
                            errorMessage.value = '❌ 保存设置时发生错误: ' + error.message;
                        } finally {
                            saving.value = false;
                        }
                    };
                    
                    // 验证功能
                    const verifyFunctionalityUI = async () => {
                        verifying.value = true;
                        errorMessage.value = '';
                        try {
                            const results = await verifyFunctionality();
                            verificationResults.value = results;
                        } catch (error) {
                            errorMessage.value = '验证功能时发生错误: ' + error.message;
                        } finally {
                            verifying.value = false;
                        }
                    };
                    
                    onMounted(() => {
                        loadSettings();
                    });
                    
                    return {
                        settings,
                        loading,
                        saving,
                        errorMessage,
                        saveSettings,
                        enabledOptions,
                        disabledOptions,
                        currentPage,
                        verificationResults,
                        verifying,
                        verifyFunctionalityUI
                    };
                },
                
                template: `
                    <div>
                        <!-- 固定头部 -->
                        <div class="fixed-header">
                            <div>
                                <h1 class="header-title">Logd Disabler for ColorOS16</h1>
                                <div class="header-author">by zhangchongjie</div>
                            </div>
                            <button 
                                v-if="currentPage === 'config'"
                                @click="saveSettings" 
                                :disabled="saving"
                                class="save-button-top"
                            >
                                <span v-if="saving">保存中...</span>
                                <span v-else>
                                    <span class="restart-icon">🔄</span>
                                    保存重启
                                </span>
                            </button>
                        </div>
                        
                        <!-- 页面内容 -->
                        <div class="page-content">
                            <div v-if="currentPage === 'config'">
                                <div v-if="loading" class="loading">
                                    <div class="spinner"></div>
                                    <p>加载中...</p>
                                </div>
                                
                                <div v-else>
                                    <div v-if="errorMessage" class="error-message">
                                        {{ errorMessage }}
                                    </div>
                                    
                                    <!-- 默认启用的选项 -->
                                    <h2 class="section-title section-enabled">🟢 默认启用</h2>
                                    <div class="setting-item setting-enabled" v-for="option in enabledOptions" :key="option.key">
                                        <label>
                                            <input 
                                                type="checkbox" 
                                                v-model="settings[option.key]"
                                                :disabled="saving"
                                            >
                                            {{ option.name }}
                                        </label>
                                        <p class="description">{{ option.description }}</p>
                                    </div>
                                    
                                    <!-- 默认禁用的选项 -->
                                    <h2 class="section-title section-disabled">⚪ 默认禁用</h2>
                                    <div class="setting-item setting-disabled" v-for="option in disabledOptions" :key="option.key">
                                        <label>
                                            <input 
                                                type="checkbox" 
                                                v-model="settings[option.key]"
                                                :disabled="saving"
                                            >
                                            {{ option.name }}
                                        </label>
                                        <p class="description">{{ option.description }}</p>
                                    </div>
                                </div>
                            </div>
                            
                            <div v-else-if="currentPage === 'verify'">
                                <div v-if="verifying" class="loading">
                                    <div class="spinner"></div>
                                    <p>正在检测功能状态...</p>
                                </div>
                                
                                <div v-else>
                                    <div v-if="errorMessage" class="error-message">
                                        {{ errorMessage }}
                                    </div>
                                    
                                    <div v-if="Object.keys(verificationResults).length === 0" class="verification-item">
                                        <p>点击下方按钮开始检测功能状态</p>
                                    </div>
                                    
                                    <div v-for="(result, key) in verificationResults" :key="key" class="verification-item">
                                        <div class="verification-title">
                                            <span :class="{
                                                'status-success': result.status === 'success',
                                                'status-error': result.status === 'error',
                                                'status-warning': result.status === 'warning'
                                            }">
                                                {{ result.status === 'success' ? '🟢' : result.status === 'error' ? '🔴' : '🟡' }}
                                            </span>
                                            {{ result.title }}
                                        </div>
                                        <div class="verification-detail" v-for="detail in result.details" :key="detail.name">
                                            <div class="verification-subitem">
                                                <strong>{{ detail.name }}:</strong> 
                                                <span :class="{
                                                    'status-success': detail.status === 'success',
                                                    'status-error': detail.status === 'error',
                                                    'status-warning': detail.status === 'warning'
                                                }">
                                                    {{ detail.message }}
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div class="button-container">
                                        <button 
                                            @click="verifyFunctionalityUI" 
                                            :disabled="verifying"
                                            class="save-button"
                                        >
                                            <span v-if="verifying">检测中...</span>
                                            <span v-else>
                                                <span class="restart-icon">🔍</span>
                                                重新检测功能状态
                                            </span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 底部导航栏 -->
                        <div class="bottom-nav">
                            <a 
                                href="#" 
                                class="nav-item" 
                                :class="{ active: currentPage === 'config' }"
                                @click.prevent="currentPage = 'config'"
                            >
                                <div class="nav-icon">⚙️</div>
                                <div>配置</div>
                            </a>
                            <a 
                                href="#" 
                                class="nav-item" 
                                :class="{ active: currentPage === 'verify' }"
                                @click.prevent="currentPage = 'verify'; verifyFunctionalityUI()"
                            >
                                <div class="nav-icon">✅</div>
                                <div>验证</div>
                            </a>
                        </div>
                    </div>
                `
            });
            
            app.mount('#app');
        }
    </script>
    
    <!-- 引入本地 Vue.js 文件 -->
    <script src="assets/vue.global.prod.js"></script>
    
    <script>
        // 现在 Vue 已经通过 script 标签加载，直接初始化应用
        initializeApp();
    </script>
</body>
</html>
